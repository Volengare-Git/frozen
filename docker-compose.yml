services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - congelo-data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/congelo.db
    networks:
      - congelo-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - congelo-net

networks:
  congelo-net:

volumes:
  congelo-data:
