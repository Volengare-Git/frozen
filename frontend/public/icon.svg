<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#3b82f6"/>
  <!-- Snowflake -->
  <g stroke="white" stroke-width="28" stroke-linecap="round">
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="137" y1="137" x2="375" y2="375"/>
    <line x1="375" y1="137" x2="137" y2="375"/>
    <!-- Branches -->
    <line x1="256" y1="80"  x2="210" y2="126"/>
    <line x1="256" y1="80"  x2="302" y2="126"/>
    <line x1="256" y1="432" x2="210" y2="386"/>
    <line x1="256" y1="432" x2="302" y2="386"/>
    <line x1="80"  y1="256" x2="126" y2="210"/>
    <line x1="80"  y1="256" x2="126" y2="302"/>
    <line x1="432" y1="256" x2="386" y2="210"/>
    <line x1="432" y1="256" x2="386" y2="302"/>
  </g>
</svg>
